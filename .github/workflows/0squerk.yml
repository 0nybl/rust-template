name: 0squerk
on:
  issue_comment:
    types: [created]

concurrency:
  group: squerk-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  merge:
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '/merge') }}
    runs-on: ubuntu-latest
    steps:
      - name: Mint app token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SQUERK_APP_ID }}
          private-key: ${{ secrets.SQUERK_APP_PRIVATE_KEY }}

      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app.outputs.token }}

      - name: Install 0squerk
        run: cargo install --git https://github.com/0nybl/0squerk --tag v0.1.0 --bin 0squerk squerk

      - name: Write event payload
        env:
          EVENT: ${{ toJSON(github.event) }}
        run: printf '%s' "$EVENT" > event.json

      - name: Decide
        run: 0squerk decide --event event.json --config .0merge.toml --out decision.json

      - name: Gate
        id: gate
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          PR: ${{ github.event.issue.number }}
        run: |
          proceed="$(jq -r '.proceed' decision.json)"
          echo "proceed=$proceed" >> "$GITHUB_OUTPUT"
          if [ "$proceed" != "true" ]; then
            gh pr comment "$PR" --body "🚫 squerk: $(jq -r '.reason' decision.json)"
          fi

      - name: React to comment
        if: steps.gate.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          gh api -X POST \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content=heart

      - name: Acknowledge
        if: steps.gate.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          PR: ${{ github.event.issue.number }}
        run: |
          gh pr comment "$PR" --body "🛠 squerk is rebuilding and testing this PR…"

      - name: Rebuild squashed result and test
        if: steps.gate.outputs.proceed == 'true'
        id: build
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          PR: ${{ github.event.issue.number }}
        run: |
          B0="$(git rev-parse HEAD)"
          echo "b0=$B0" >> "$GITHUB_OUTPUT"
          git fetch origin "pull/$PR/head:squerk-pr"
          git merge --squash squerk-pr
          title="$(gh pr view "$PR" --json title --jq .title)"
          git -c user.name=0squerk -c user.email=bot@0nybl.dev commit -m "$title (#$PR)"
          cmd="$(jq -r '.command' decision.json)"
          set +e
          bash -lc "$cmd" 2>&1 | tee build.log
          echo "code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Report failure
        if: steps.gate.outputs.proceed == 'true' && steps.build.outputs.code != '0'
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          PR: ${{ github.event.issue.number }}
        run: |
          tail -c 4000 build.log > tail.log
          printf '❌ squerk: tests failed, not merging.\n\n```\n%s\n```\n' "$(cat tail.log)" \
            | gh pr comment "$PR" --body-file -
          exit 1

      - name: Report rebuild error
        if: ${{ always() && steps.gate.outputs.proceed == 'true' && steps.build.outcome == 'failure' }}
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          PR: ${{ github.event.issue.number }}
        run: |
          gh pr comment "$PR" \
            --body "❌ squerk: could not rebuild the PR (merge conflict or git error). Not merging."

      - name: Guard base unchanged
        if: steps.gate.outputs.proceed == 'true' && steps.build.outputs.code == '0'
        id: guard
        run: |
          git fetch origin "${{ github.event.repository.default_branch }}"
          now="$(git rev-parse "origin/${{ github.event.repository.default_branch }}")"
          if [ "$now" != "${{ steps.build.outputs.b0 }}" ]; then
            echo "moved=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Report base moved
        if: steps.gate.outputs.proceed == 'true' && steps.build.outputs.code == '0' && steps.guard.outputs.moved == '1'
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          PR: ${{ github.event.issue.number }}
        run: |
          gh pr comment "$PR" --body "⏳ squerk: base moved during the build — re-run /merge."

      - name: Merge
        if: steps.gate.outputs.proceed == 'true' && steps.build.outputs.code == '0' && steps.guard.outputs.moved != '1'
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          PR: ${{ github.event.issue.number }}
        run: |
          gh pr merge "$PR" --squash --delete-branch
          gh pr comment "$PR" --body "✅ merged by squerk"
